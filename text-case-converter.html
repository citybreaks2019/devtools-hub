<!DOCTYPE html>
<html>
<head>
<title>Case Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;text-align:center;}
.top-bar{background:#6c5ce7;padding:10px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px;border-radius:8px;margin:5px;}
textarea{width:80%;height:120px;margin:20px;border-radius:10px;padding:10px;}
button{padding:10px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;margin:5px;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 style="color:#6c5ce7;">Case Converter</h2>

<textarea id="text"></textarea><br>

<button onclick="upper()">UPPERCASE</button>
<button onclick="lower()">lowercase</button>
<button onclick="reset()">Clear</button>

<script>
function upper(){text.value=text.value.toUpperCase();}
function lower(){text.value=text.value.toLowerCase();}
function reset(){text.value="";}
</script>

</body>
</html>
