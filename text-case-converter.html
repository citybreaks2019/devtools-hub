<!DOCTYPE html>
<html>
<head>
<title>Case Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;margin:0;text-align:center;}
.top-bar{display:flex;justify-content:space-between;background:#6c5ce7;padding:12px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;}

.title{margin:20px;color:#6c5ce7;}

.container{
max-width:500px;margin:auto;background:#fff;padding:25px;
border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

textarea{
width:100%;height:130px;padding:12px;
border-radius:10px;border:1px solid #ddd;margin-bottom:15px;
}

button{
width:100%;padding:12px;margin-top:8px;
border:none;border-radius:10px;background:#6c5ce7;
color:#fff;font-weight:600;
}
</style>
</head>

<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">Case Converter</h2>

<div class="container">
<textarea id="text"></textarea>

<button onclick="upper()">UPPERCASE</button>
<button onclick="lower()">lowercase</button>
<button onclick="reset()">Clear</button>
</div>

<script>
function upper(){text.value=text.value.toUpperCase();}
function lower(){text.value=text.value.toLowerCase();}
function reset(){text.value="";}
</script>

</body>
</html>
