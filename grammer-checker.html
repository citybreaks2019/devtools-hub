<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Checker - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="tool-card">
            <h1>📝 Grammar Checker</h1>
            <textarea id="text">I have went to the store and buyed some apples. Their is a mistake here.</textarea>
            <button onclick="checkGrammar()">Check</button>
            <button onclick="clearText()">Clear</button>
            <div id="results" class="results" style="display: none;"></div>
        </div>
    </div>
    <script>
        const errors = {
            'went after have': 'gone',
            'buyed': 'bought',
            'thier': 'their',
            'recieve': 'receive',
            'seperate': 'separate'
        };

        function checkGrammar() {
            const text = document.getElementById('text').value;
            const div = document.getElementById('results');
            div.style.display = 'block';
            let html = '<h3>Issues:</h3>';
            let found = false;
            
            if (text.includes('have went')) {
                html += '<p>❌ "have went" → <b>have gone</b></p>';
                found = true;
            }
            if (text.includes('buyed')) {
                html += '<p>❌ "buyed" → <b>bought</b></p>';
                found = true;
            }
            if (text.includes('thier')) {
                html += '<p>❌ "thier" → <b>their</b></p>';
                found = true;
            }
            if (!found) html += '<p>✓ No errors</p>';
            div.innerHTML = html;
        }

        function clearText() {
            document.getElementById('text').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
</body>
</html>
