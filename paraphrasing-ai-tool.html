<!DOCTYPE html>
<html>
<head>
<title>Paraphrasing Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;text-align:center;}
.top-bar{background:#6c5ce7;padding:10px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px;border-radius:8px;margin:5px;}
textarea{width:80%;height:150px;margin:20px;border-radius:10px;padding:10px;}
button{padding:10px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;margin:5px;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 style="color:#6c5ce7;">Paraphrasing Tool</h2>

<textarea id="input"></textarea><br>

<button onclick="para()">Rewrite</button>
<button onclick="reset()">Clear</button>

<h3 id="output"></h3>

<script>
function para(){output.innerText=input.value.split(" ").reverse().join(" ");}
function reset(){input.value="";output.innerText="";}
</script>

</body>
</html>
