<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Hub - Free Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: #333;
            display: block;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .tool-card:active {
            transform: scale(0.98);
            border-color: #667eea;
        }
        .tool-card h2 {
            color: #667eea;
            margin: 10px 0 5px;
        }
        .tool-icon {
            font-size: 3em;
        }
        @media (min-width: 600px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ DevTools Hub</h1>
            <p>Free tools for everyone</p>
        </header>
        
        <main class="tools-grid">
            <a href="password-generator.html" class="tool-card">
                <div class="tool-icon">🔐</div>
                <h2>Password Generator</h2>
                <p>Create strong, secure passwords instantly</p>
            </a>
            
            <a href="json-formatter.html" class="tool-card">
                <div class="tool-icon">🔄</div>
                <h2>JSON Formatter</h2>
                <p>Format and validate JSON</p>
            </a>
            
            <a href="base64.html" class="tool-card">
                <div class="tool-icon">🔤</div>
                <h2>Base64 Tool</h2>
                <p>Encode and decode Base64</p>
            </a>
            
            <a href="word-counter.html" class="tool-card">
                <div class="tool-icon">📝</div>
                <h2>Word Counter</h2>
                <p>Count words, characters, and sentences</p>
            </a>
        </main>
    </div>
</body>
</html>
