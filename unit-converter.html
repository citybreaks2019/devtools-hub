<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://www.exploredevtools.com/unit-converter.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unit Converter – Convert Length, Weight, Temperature Online</title>

<meta name="description" content="Convert units instantly. Length, weight, temperature and more. Free unit converter online.">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#f5f3ff;
padding:20px;
}

.back-btn{
display:inline-block;
background:#6d28d9;
color:#fff;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
margin-bottom:20px;
}

.tool-card{
background:#fff;
padding:25px;
border-radius:16px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#6d28d9;
margin-bottom:15px;
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#6d28d9;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:15px;
font-weight:bold;
text-align:center;
}

.blog{
max-width:600px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:12px;
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Tools</a>

<div class="tool-card">
<h1>📏 Unit Converter</h1>

<input type="number" id="value" placeholder="Enter value">

<select id="from">
<option value="m">Meter</option>
<option value="km">Kilometer</option>
<option value="cm">Centimeter</option>
</select>

<select id="to">
<option value="km">Kilometer</option>
<option value="m">Meter</option>
<option value="cm">Centimeter</option>
</select>

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

</div>

<div class="blog">
<h2>Why Use Unit Converter?</h2>
<p>Quickly convert measurements without manual calculation errors.</p>

<h2>Popular Conversions</h2>
<p>Length, weight, temperature, and speed conversions are widely used in daily tasks.</p>
</div>

<script>
function convert(){
let val=parseFloat(document.getElementById('value').value);
let from=document.getElementById('from').value;
let to=document.getElementById('to').value;

if(isNaN(val)){alert("Enter value");return;}

let meters;

if(from==="km") meters=val*1000;
else if(from==="cm") meters=val/100;
else meters=val;

let result;

if(to==="km") result=meters/1000;
else if(to==="cm") result=meters*100;
else result=meters;

document.getElementById('result').innerHTML=result+" "+to;
}
</script>

</body>
