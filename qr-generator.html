<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://www.exploredevtools.com/qr-generator.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free QR Code Generator – Create QR Codes Instantly</title>

<meta name="description" content="Generate QR codes instantly for URLs, text, phone numbers. Free QR code generator with download option.">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#f5f3ff;
padding:20px;
}

.back-btn{
display:inline-block;
background:#6d28d9;
color:#fff;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
margin-bottom:20px;
}

.tool-card{
background:#fff;
padding:25px;
border-radius:16px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h1{color:#6d28d9;margin-bottom:15px;}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#6d28d9;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

#qr img{
margin-top:20px;
}

.download-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#10b981;
color:#fff;
border-radius:8px;
text-decoration:none;
}

.blog{
max-width:600px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:12px;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Tools</a>

<div class="tool-card">
<h1>📱 QR Code Generator</h1>

<input type="text" id="text" placeholder="Enter URL or text">

<button onclick="generateQR()">Generate QR</button>

<div id="qr"></div>

<a id="download" class="download-btn" style="display:none">Download QR</a>

</div>

<div class="blog">
<h2>What is a QR Code?</h2>
<p>QR codes allow users to scan and access links instantly using mobile devices.</p>

<h2>Why Use QR Codes?</h2>
<p>Perfect for marketing, payments, websites, and contact sharing.</p>
</div>

<script>
function generateQR(){
const text=document.getElementById('text').value;
if(!text){alert("Enter text");return;}

const qrUrl="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(text);

document.getElementById('qr').innerHTML=`<img src="${qrUrl}">`;

const download=document.getElementById('download');
download.href=qrUrl;
download.download="qr-code.png";
download.style.display="inline-block";
}
</script>

</body>
</html>
