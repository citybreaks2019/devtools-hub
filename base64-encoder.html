<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - Free Online Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Super Stylish Round Back Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: #667eea;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 25px;
            border: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateX(-5px) scale(1.05);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .back-button:hover::before {
            opacity: 1;
        }
        
        .back-button:active {
            transform: translateX(-2px) scale(0.98);
        }
        
        .back-icon {
            font-size: 1.4em;
            line-height: 1;
            transition: transform 0.3s ease;
        }
        
        .back-button:hover .back-icon {
            transform: translateX(-5px);
        }
        
        .back-text {
            line-height: 1;
        }
        
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.98);
        }
        .primary-btn {
            background: #667eea;
            color: white;
        }
        .secondary-btn {
            background: #e2e8f0;
            color: #333;
        }
        .output-area {
            margin-top: 15px;
        }
        .error-message {
            color: #e53e3e;
            padding: 10px;
            background: #fed7d7;
            border-radius: 8px;
            margin-top: 10px;
        }
        .success-message {
            color: #2f855a;
            padding: 10px;
            background: #c6f6d5;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            .back-button {
                padding: 12px 20px;
                font-size: 1em;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Fancy Round Back Button -->
        <a href="index.html" class="back-button">
            <span class="back-icon">←</span>
            <span class="back-text">Back to Tools</span>
        </a>
        
        <div class="tool-card">
            <h1>🔤 Base64 Encoder / Decoder</h1>
            
            <textarea id="base64Input" rows="6" placeholder="Enter text to encode or Base64 to decode..."></textarea>
            
            <div class="button-group">
                <button class="primary-btn" onclick="encodeBase64()">Encode to Base64</button>
                <button class="primary-btn" onclick="decodeBase64()">Decode from Base64</button>
                <button class="secondary-btn" onclick="swapBase64()">Swap</button>
                <button class="secondary-btn" onclick="clearBase64()">Clear</button>
            </div>
            
            <div class="output-area">
                <textarea id="base64Output" rows="6" readonly placeholder="Result will appear here..."></textarea>
            </div>
            
            <div id="base64Message"></div>
        </div>
    </div>
    
    <script>
        function encodeBase64() {
            const input = document.getElementById('base64Input').value;
            const output = document.getElementById('base64Output');
            const message = document.getElementById('base64Message');
            
            try {
                if (!input.trim()) {
                    message.className = 'error-message';
                    message.textContent = 'Please enter text to encode';
                    return;
                }
                
                // Convert string to Base64
                const encoded = btoa(unescape(encodeURIComponent(input)));
                output.value = encoded;
                message.className = 'success-message';
                message.textContent = '✅ Encoded successfully';
            } catch (error) {
                message.className = 'error-message';
                message.textContent = '❌ Encoding failed: ' + error.message;
                output.value = '';
            }
        }
        
        function decodeBase64() {
            const input = document.getElementById('base64Input').value;
            const output = document.getElementById('base64Output');
            const message = document.getElementById('base64Message');
            
            try {
                if (!input.trim()) {
                    message.className = 'error-message';
                    message.textContent = 'Please enter Base64 to decode';
                    return;
                }
                
                // Check if it's valid Base64
                const base64Regex = /^[A-Za-z0-9+/]*={0,2}$/;
                if (!base64Regex.test(input.replace(/\s/g, ''))) {
                    throw new Error('Invalid Base64 format');
                }
                
                // Decode Base64 to string
                const decoded = decodeURIComponent(escape(atob(input)));
                output.value = decoded;
                message.className = 'success-message';
                message.textContent = '✅ Decoded successfully';
            } catch (error) {
                message.className = 'error-message';
                message.textContent = '❌ Decoding failed: ' + error.message;
                output.value = '';
            }
        }
        
        function swapBase64() {
            const input = document.getElementById('base64Input');
            const output = document.getElementById('base64Output');
            
            if (output.value) {
                input.value = output.value;
                output.value = '';
                document.getElementById('base64Message').textContent = '';
            }
        }
        
        function clearBase64() {
            document.getElementById('base64Input').value = '';
            document.getElementById('base64Output').value = '';
            document.getElementById('base64Message').textContent = '';
        }
    </script>
</body>
</html>
