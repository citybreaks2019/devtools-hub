<!DOCTYPE html>
<html>
<head>
<title>AI Caption Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;margin:0;text-align:center;}
.top-bar{display:flex;justify-content:space-between;background:#6c5ce7;padding:12px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;}

.title{margin:20px;color:#6c5ce7;}

.container{
max-width:400px;margin:auto;background:#fff;padding:25px;
border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;padding:12px;margin-bottom:15px;
border-radius:10px;border:1px solid #ddd;
}

button{
width:100%;padding:14px;margin-top:10px;
border:none;border-radius:10px;background:#6c5ce7;
color:#fff;font-weight:600;
}

.result{margin-top:20px;}
</style>
</head>

<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">AI Caption Generator</h2>

<div class="container">
<input id="topic" placeholder="Enter topic">

<button onclick="gen()">Generate</button>
<button onclick="reset()">Clear</button>

<div class="result" id="res"></div>
</div>

<script>
function gen(){
let t=topic.value;
if(!t)return;
res.innerText="🔥 "+t+" vibes only! #"+t.replace(/\s/g,'')+" #viral";
}
function reset(){
topic.value="";
res.innerText="";
}
</script>

</body>
</html>
