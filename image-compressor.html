<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://www.exploredevtools.com/image-compressor.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor - ExploreDevTools</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#f5f3ff;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#667eea,#764ba2);
padding:12px;
border-radius:12px;
margin:10px;
}

.top-btn{
flex:1;
text-align:center;
background:#fff;
color:#5b21b6;
padding:12px;
margin:5px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* HEADING */
h1{
text-align:center;
color:#6d28d9;
margin-bottom:10px;
}

p{
text-align:center;
color:#555;
margin-bottom:20px;
}

/* UPLOAD */
.upload{
border:2px dashed #7c3aed;
padding:30px;
text-align:center;
border-radius:10px;
cursor:pointer;
background:#faf5ff;
margin-bottom:20px;
}

.upload:hover{
background:#f3e8ff;
}

/* PREVIEW */
.preview{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.box{
flex:1;
min-width:250px;
background:#fafafa;
padding:15px;
border-radius:10px;
text-align:center;
}

img{
max-width:100%;
max-height:200px;
margin-top:10px;
}

/* CONTROLS */
.controls{
margin-top:20px;
padding:15px;
background:#faf5ff;
border-radius:10px;
}

input[type=range]{
width:100%;
margin:10px 0;
}

/* BUTTONS */
.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{
background:#7c3aed;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.download{
background:#22c55e;
color:white;
display:none;
text-decoration:none;
text-align:center;
}

/* MOBILE */
@media(max-width:600px){
.preview{
flex-direction:column;
}
}
</style>
</head>

<body>

<!-- TOP NAV -->
<div class="top-bar">
<a href="index.html" class="top-btn">🏠 Home</a>
<a href="index.html" class="top-btn">← Back</a>
</div>

<div class="container">
<div class="card">

<h1>🗜️ Image Compressor</h1>
<p>Reduce image size instantly for faster websites</p>

<!-- UPLOAD -->
<div class="upload" onclick="fileInput.click()">
📁 Click to Upload Image<br>
<small>JPG, PNG, WebP (Max 10MB)</small>
<input type="file" id="fileInput" hidden accept="image/*">
</div>

<!-- PREVIEW -->
<div id="previewSection" style="display:none;">

<div class="preview">

<div class="box">
<h3>Original</h3>
<img id="originalImg">
<div id="originalInfo"></div>
</div>

<div class="box">
<h3>Compressed</h3>
<img id="compressedImg">
<div id="compressedInfo"></div>
<div id="savingsInfo" style="color:#16a34a;font-weight:bold;"></div>
</div>

</div>

<!-- CONTROLS -->
<div class="controls">

<label>Quality: <span id="qVal">50</span>%</label>
<input type="range" id="quality" min="10" max="100" value="50"
oninput="qVal.innerText=this.value">

<button class="btn primary" onclick="compressImage()">Compress</button>
<button class="btn danger" onclick="deleteImage()">Clear</button>

<a id="downloadLink" class="btn download">Download</a>

</div>

</div>

</div>
</div>

<script>
let originalFile, originalImage, originalSize;

fileInput.addEventListener('change', function(e){
const file = e.target.files[0];
if(!file) return;

if(file.size > 10*1024*1024){
alert("Max 10MB allowed");
return;
}

originalFile = file;
originalSize = file.size;

const reader = new FileReader();
reader.onload = function(e){
originalImage = new Image();
originalImage.src = e.target.result;

originalImage.onload = function(){
originalImg.src = e.target.result;
originalInfo.innerHTML = `
Size: ${(originalSize/1024).toFixed(2)} KB<br>
${originalImage.width} x ${originalImage.height}
`;

previewSection.style.display="block";
};
};
reader.readAsDataURL(file);
});

function compressImage(){
if(!originalImage) return;

const q = quality.value/100;

const canvas = document.createElement("canvas");
canvas.width = originalImage.width;
canvas.height = originalImage.height;

const ctx = canvas.getContext("2d");
ctx.drawImage(originalImage,0,0);

canvas.toBlob(function(blob){

const url = URL.createObjectURL(blob);
compressedImg.src = url;

const newSize = blob.size;
const saved = ((1 - newSize/originalSize)*100).toFixed(1);

compressedInfo.innerHTML = `
Size: ${(newSize/1024).toFixed(2)} KB
`;

savingsInfo.innerHTML = saved>0 ?
`Saved ${saved}%` : "Try lower quality";

downloadLink.href = url;
downloadLink.download = "compressed.jpg";
downloadLink.style.display="block";

}, "image/jpeg", q);
}

function deleteImage(){
fileInput.value="";
previewSection.style.display="none";
originalImg.src="";
compressedImg.src="";
downloadLink.style.display="none";
}
</script>

</body>
</html>
