<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;margin:0;}
.top-bar{display:flex;justify-content:space-between;background:#6c5ce7;padding:12px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;}
.title{text-align:center;margin:20px;color:#6c5ce7;}

.container{
max-width:400px;margin:auto;background:#fff;padding:25px;
border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;padding:14px;margin-bottom:15px;
border-radius:10px;border:1px solid #ddd;font-size:16px;
}

button{
width:100%;padding:14px;margin-top:10px;
border:none;border-radius:10px;background:#6c5ce7;
color:#fff;font-weight:600;cursor:pointer;
}

.result{margin-top:20px;font-size:1.2em;}
</style>
</head>

<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">EMI Calculator</h2>

<div class="container">
<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Interest Rate (%)">
<input id="time" placeholder="Months">

<button onclick="calc()">Calculate EMI</button>
<button onclick="reset()">Clear</button>

<div class="result" id="res"></div>
</div>

<script>
function calc(){
let P=loan.value,R=rate.value/1200,N=time.value;
if(!P||!R||!N)return;
let emi=P*R*Math.pow(1+R,N)/(Math.pow(1+R,N)-1);
res.innerText="Monthly EMI: ₹"+Math.round(emi);
}
function reset(){
loan.value="";rate.value="";time.value="";
res.innerText="";
}
</script>

</body>
</html>
