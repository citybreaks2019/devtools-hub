<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;margin:0;}
.top-bar{display:flex;justify-content:space-between;background:#6c5ce7;padding:12px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px 12px;border-radius:8px;text-decoration:none;}
.title{text-align:center;color:#6c5ce7;margin:20px;}
.container{max-width:400px;margin:auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:12px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;margin-top:5px;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">EMI Calculator</h2>

<div class="container">
<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Interest Rate (%)">
<input id="time" placeholder="Months">

<button onclick="calc()">Calculate EMI</button>
<button onclick="reset()">Clear</button>

<h3 id="res"></h3>
</div>

<script>
function calc(){
let P=loan.value,R=rate.value/1200,N=time.value;
let emi=P*R*Math.pow(1+R,N)/(Math.pow(1+R,N)-1);
res.innerText="EMI: ₹"+Math.round(emi);
}
function reset(){loan.value="";rate.value="";time.value="";res.innerText="";}
</script>

</body>
</html>
